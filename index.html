<!DOCTYPE html>
<html>
<head>
    <title>For Himanshu ❤️</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(to bottom right, #ffccd5, #ffe6f0);
            font-family: 'Arial', sans-serif;
            text-align: center;
            overflow-x: hidden;
        }

        h1 {
            margin-top: 80px;
            font-size: 40px;
            color: #ff0066;
            animation: fadeIn 3s ease-in-out;
        }

        p {
            font-size: 20px;
            width: 70%;
            margin: auto;
            color: #333;
            animation: fadeIn 4s ease-in-out;
        }

        button {
            margin-top: 30px;
            padding: 12px 25px;
            background-color: #ff4d88;
            color: white;
            border: none;
            border-radius: 25px;
            font-size: 16px;
            cursor: pointer;
        }

        button:hover {
            background-color: #ff1a66;
        }

        .timer {
            margin-top: 40px;
            font-size: 22px;
            color: #cc0052;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* Floating Hearts */
        .heart {
            position: fixed;
            bottom: -10px;
            color: red;
            font-size: 20px;
            animation: floatUp 5s linear infinite;
        }

        @keyframes floatUp {
            0% { transform: translateY(0); opacity: 1; }
            100% { transform: translateY(-800px); opacity: 0; }
        }
    </style>
</head>
<body>

    <h1>For My Love Himanshu ❤️</h1>

    <p>
        You are the one who gives me a reason for living. <br><br>
        You are the reason behind my happiness. <br><br>
        Since 15 February 2026, my world has been brighter because of you. 💕
    </p>

    <button onclick="showLetter()">Open My Heart 💌</button>

    <div class="timer" id="loveTimer"></div>

    <script>
        function showLetter() {
            alert("Himanshu ❤️\n\nYou came into my life and changed everything.\nI am so lucky to have you.\nForever yours 💖");
        }

        // Relationship Timer
        const startDate = new Date("February 15, 2026 00:00:00").getTime();

        function updateTimer() {
            const now = new Date().getTime();
            const distance = now - startDate;

            const days = Math.floor(distance / (1000 * 60 * 60 * 24));
            const hours = Math.floor((distance / (1000 * 60 * 60)) % 24);
            const minutes = Math.floor((distance / (1000 * 60)) % 60);
            const seconds = Math.floor((distance / 1000) % 60);

            document.getElementById("loveTimer").innerHTML =
                "Together for: " + days + " days " + hours + " hours " + minutes + " minutes " + seconds + " seconds ❤️";
        }

        setInterval(updateTimer, 1000);

        // Floating Hearts Generator
        setInterval(function() {
            const heart = document.createElement("div");
            heart.className = "heart";
            heart.innerHTML = "❤️";
            heart.style.left = Math.random() * 100 + "vw";
            heart.style.animationDuration = (3 + Math.random() * 2) + "s";
            document.body.appendChild(heart);

            setTimeout(() => {
                heart.remove();
            }, 5000);
        }, 500);
    </script>

</body>
</html>
